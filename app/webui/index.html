<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TeeOff</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- App shell -->
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark-sm">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 8v44" stroke="var(--text-dim)" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M20 9c8 4 14-4 23 1 0 0-3 5 0 12-9-5-15 3-23-1V9Z" fill="var(--accent)"/>
            <circle cx="40" cy="50" r="5.5" fill="#fff"/>
          </svg>
        </div>
        <div class="brand-text"><span class="tee">Tee</span><span class="off">Off</span></div>
      </div>

      <nav class="nav" id="nav">
        <button class="nav-item active" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
          Dashboard
        </button>
        <button class="nav-item" data-page="schedule">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>
          Schedule
        </button>
        <button class="nav-item" data-page="account">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.5 3.6-6 8-6s8 2.5 8 6"/></svg>
          Account
        </button>
        <button class="nav-item" data-page="activity">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2.5 7 5-16L17 12h4"/></svg>
          Activity
        </button>
      </nav>

      <div class="sidebar-foot">
        <div class="mini-status" id="mini-status"><span class="dot"></span><span id="mini-status-text">Loading…</span></div>
        <div class="version" id="version">v—</div>
      </div>
    </aside>

    <main class="content" id="content"></main>
  </div>

  <!-- Splash -->
  <div class="splash" id="splash">
    <div class="brand-mark">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 8v44" stroke="var(--text-dim)" stroke-width="3" stroke-linecap="round"/>
        <path d="M20 9c8 4 14-4 23 1 0 0-3 5 0 12-9-5-15 3-23-1V9Z" fill="var(--accent)"/>
        <ellipse cx="32" cy="55" rx="15" ry="4" fill="var(--surface-3)"/>
        <circle cx="40" cy="50" r="5.5" fill="#fff"/>
      </svg>
    </div>
    <div class="brand-name"><span class="tee">Tee</span><span class="off">Off</span></div>
    <div class="brand-sub">GOLF BOOKER</div>
    <div class="conn" id="conn"><span class="spin"></span><span id="conn-text">Starting up…</span></div>
  </div>

  <div id="toast-wrap"></div>
  <script src="app.js"></script>
</body>
</html>
